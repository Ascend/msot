<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 262" font-family="'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8faff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#eef2ff;stop-opacity:1"/>
    </linearGradient>

    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>

    <linearGradient id="stage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>

    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <clipPath id="round-corner">
      <rect width="960" height="262" rx="16"/>
    </clipPath>
  </defs>

  <rect width="960" height="262" rx="16" fill="url(#bg)"/>

  <rect x="0" y="0" width="960" height="52" fill="url(#header)" clip-path="url(#round-corner)"/>

  <g transform="translate(340, 26)">
    <circle cx="0" cy="0" r="11" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <polygon points="3,-9 -5,1 1,1 -3,9 5,-1 -1,-1" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <text x="366" y="34" text-anchor="start" fill="white" font-size="18" font-weight="bold">Ascend AI Op Dev Toolchain Overview</text>

  <line x1="192" y1="72" x2="192" y2="210" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="384" y1="72" x2="384" y2="210" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="576" y1="72" x2="576" y2="210" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="768" y1="72" x2="768" y2="210" stroke="#cbd5e1" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="24" y="72" width="144" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="96" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Performance Prediction</text>
  <rect x="28" y="120" width="136" height="70" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="96" y="141" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msKPP</text>
  <text x="96" y="160" text-anchor="middle" fill="#64748b" font-size="10">Performance ceiling</text>
  <text x="96" y="175" text-anchor="middle" fill="#64748b" font-size="10">prediction</text>

  <rect x="216" y="72" width="144" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="288" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Project Generation</text>
  <rect x="220" y="120" width="136" height="70" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="288" y="141" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msOpGen</text>
  <text x="288" y="160" text-anchor="middle" fill="#64748b" font-size="10">Template project</text>
  <text x="288" y="175" text-anchor="middle" fill="#64748b" font-size="10">generation</text>

  <rect x="408" y="72" width="144" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="480" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Anomaly Detection</text>
  <rect x="412" y="120" width="136" height="70" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="141" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msSanitizer</text>
  <text x="480" y="160" text-anchor="middle" fill="#64748b" font-size="10">Memory, race, uninit</text>
  <text x="480" y="175" text-anchor="middle" fill="#64748b" font-size="10">&amp; sync detection</text>

  <rect x="600" y="72" width="144" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="672" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Native Debugging</text>
  <rect x="604" y="120" width="136" height="70" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="672" y="141" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msDebug</text>
  <text x="672" y="160" text-anchor="middle" fill="#64748b" font-size="10">Native environment</text>
  <text x="672" y="175" text-anchor="middle" fill="#64748b" font-size="10">debugging &amp; stepping</text>

  <rect x="792" y="72" width="144" height="36" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  <text x="864" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Performance Analysis</text>
  <rect x="796" y="120" width="136" height="70" rx="8" fill="white" filter="url(#shadowSm)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="864" y="141" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">msOpProf</text>
  <text x="864" y="160" text-anchor="middle" fill="#64748b" font-size="10">On-device &amp; simulation</text>
  <text x="864" y="175" text-anchor="middle" fill="#64748b" font-size="10">data collection</text>

  <rect x="16" y="200" width="928" height="36" rx="10" fill="url(#footerBg)" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>

  <text x="305" y="222" text-anchor="end" fill="#1e40af" font-size="13" font-weight="bold">For Ascend NPU</text>
  <circle cx="325" cy="218" r="2.5" fill="#94a3b8"/>
  <text x="429" y="222" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">High-perf operator development</text>
  <circle cx="530" cy="218" r="2.5" fill="#94a3b8"/>
  <text x="547" y="222" text-anchor="start" fill="#1e40af" font-size="13" font-weight="bold">Full lifecycle toolchain coverage</text>
</svg>